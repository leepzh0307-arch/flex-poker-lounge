<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Flex Poker - 五子棋</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/themes/default.css">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/gomoku-room.css">
</head>
<body>
  <div class="go-texture-overlay"></div>

  <div id="game-loading-mask" class="game-loading-mask">
    <div class="loading-content">
      <div class="loading-spinner"></div>
      <div class="loading-text">加载中...</div>
    </div>
  </div>

  <header class="game-header">
    <div class="header-left">
      <span class="room-label">房间号:</span>
      <span id="room-id" class="room-id">------</span>
      <button id="copy-room" class="btn-icon" title="复制">复制</button>
    </div>
    <div class="header-center">
      <span class="game-type-badge">GOMOKU</span>
    </div>
    <div class="header-right">
      <span id="connection-status" class="connection-status">
        <img src="images/icons/hyperlink-3.svg" alt="已连接" class="icon-sm">
      </span>
      <button id="voice-toggle" class="btn-icon" title="语音">
        <img src="images/icons/microphone.svg" alt="语音开启" class="icon-sm">
      </button>
      <button id="exit-room" class="btn-icon btn-danger" title="退出房间">退出</button>
    </div>
  </header>

  <main class="go-game-area">
    <div class="opponent-bar" id="opponent-bar">
      <span style="color:var(--go-sage);font-size:13px;">等待对手加入...</span>
    </div>

    <div class="board-container" id="board-container"></div>

    <div class="my-bar" id="my-bar">
      <span style="color:var(--go-sage);font-size:13px;">连接中...</span>
    </div>

    <div class="action-bar" id="action-bar">
      <span style="color:var(--go-sage);font-size:13px;">等待连接...</span>
    </div>
  </main>

  <div class="undo-popup" id="undo-popup" style="display:none;">
    <p>对手请求悔棋</p>
    <div class="undo-actions">
      <button class="btn-action accent" id="undo-accept-btn">同意</button>
      <button class="btn-action danger" id="undo-reject-btn">拒绝</button>
    </div>
  </div>

  <div class="game-end-overlay" id="game-end-overlay" style="display:none;">
    <div class="game-end-content">
      <h2 id="game-end-title">游戏结束</h2>
      <div class="result-detail" id="game-end-detail"></div>
      <div class="game-end-actions">
        <button class="btn-action accent" id="reset-btn">再来一局</button>
        <button class="btn-action" onclick="window.location.href='index.html'">返回大厅</button>
      </div>
    </div>
  </div>

  <div class="spectator-list" id="spectator-list" style="display:none;"></div>

  <div class="game-notification" id="notification" style="display:none;"></div>

  <script src="js/socket.io.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/preloader.js"></script>
  <script src="js/socket.js"></script>
  <script src="js/agora.js"></script>
  <script src="js/sounds.js"></script>
  <script src="js/gomoku-room/ui.js"></script>
  <script src="js/gomoku-room/game.js"></script>
  <script>
    GamePreloader.init({ images: [] });
    var params = new URLSearchParams(window.location.search);
    var roomId = params.get('roomId') || '';
    document.getElementById('room-id').textContent = roomId || '------';

    document.getElementById('copy-room').addEventListener('click', function() {
      var rid = document.getElementById('room-id').textContent;
      if (rid && rid !== '------') {
        navigator.clipboard.writeText(rid).then(function() {
          var btn = document.getElementById('copy-room');
          btn.textContent = '已复制';
          setTimeout(function() { btn.textContent = '复制'; }, 1500);
        });
      }
    });

    document.getElementById('voice-toggle').addEventListener('click', function() {
      if (typeof gomokuGameManager !== 'undefined' && gomokuGameManager.toggleMute) gomokuGameManager.toggleMute();
      var img = this.querySelector('img');
      if (img) img.src = 'images/icons/microphone-off.svg';
    });

    document.getElementById('exit-room').addEventListener('click', function() {
      if (confirm('确定退出房间吗？')) {
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
