<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Flex Poker - 五子棋</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/themes/default.css">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/gomoku-room.css">
</head>
<body>
  <div class="go-texture-overlay"></div>

  <div id="game-loading-mask" class="game-loading-mask">
    <div class="loading-content">
      <div class="loading-spinner"></div>
      <div class="loading-text">加载中...</div>
    </div>
  </div>

  <header class="game-header">
    <div class="header-left">
      <span class="game-type-badge">GOMOKU</span>
      <span class="room-id" id="room-id"></span>
    </div>
    <div class="header-right">
      <button class="header-btn" id="mic-btn" title="麦克风">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      </button>
      <button class="header-btn" id="speaker-btn" title="扬声器">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
      </button>
      <button class="header-btn" id="exit-btn" title="退出">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </header>

  <main class="go-game-area">
    <div class="opponent-bar" id="opponent-bar">
      <span style="color:var(--go-sage);font-size:13px;">等待对手加入...</span>
    </div>

    <div class="board-container" id="board-container"></div>

    <div class="my-bar" id="my-bar">
      <span style="color:var(--go-sage);font-size:13px;">连接中...</span>
    </div>

    <div class="action-bar" id="action-bar">
      <span style="color:var(--go-sage);font-size:13px;">等待连接...</span>
    </div>
  </main>

  <div class="undo-popup" id="undo-popup" style="display:none;">
    <p>对手请求悔棋</p>
    <div class="undo-actions">
      <button class="btn-action accent" id="undo-accept-btn">同意</button>
      <button class="btn-action danger" id="undo-reject-btn">拒绝</button>
    </div>
  </div>

  <div class="game-end-overlay" id="game-end-overlay" style="display:none;">
    <div class="game-end-content">
      <h2 id="game-end-title">游戏结束</h2>
      <div class="result-detail" id="game-end-detail"></div>
      <div class="game-end-actions">
        <button class="btn-action accent" id="reset-btn">再来一局</button>
        <button class="btn-action" onclick="window.location.href='index.html'">返回大厅</button>
      </div>
    </div>
  </div>

  <div class="spectator-list" id="spectator-list" style="display:none;"></div>

  <div class="game-notification" id="notification" style="display:none;"></div>

  <script src="js/socket.io.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/preloader.js"></script>
  <script src="js/socket.js"></script>
  <script src="js/agora.js"></script>
  <script src="js/sounds.js"></script>
  <script src="js/gomoku-room/ui.js"></script>
  <script src="js/gomoku-room/game.js"></script>
  <script>
    GamePreloader.init({ images: [] });
    var params = new URLSearchParams(window.location.search);
    document.getElementById('room-id').textContent = params.get('roomId') || '';

    document.getElementById('mic-btn').addEventListener('click', function() {
      if (typeof gomokuGameManager !== 'undefined' && gomokuGameManager.toggleMute) gomokuGameManager.toggleMute();
      this.classList.toggle('active');
    });
    document.getElementById('speaker-btn').addEventListener('click', function() {
      if (typeof gomokuGameManager !== 'undefined' && gomokuGameManager.toggleSpeaker) gomokuGameManager.toggleSpeaker();
      this.classList.toggle('active');
    });
    document.getElementById('exit-btn').addEventListener('click', function() {
      if (confirm('确定退出房间吗？')) {
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
