<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Flex Poker - 游戏房间</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/themes/default.css">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/room.css">
  <style>
    @view-transition {
      navigation: auto;
    }

    ::view-transition-old(root) {
      animation: fade-out 2.5s ease-in-out;
    }

    ::view-transition-new(root) {
      animation: fade-in 2.5s ease-in-out;
    }

    @keyframes fade-out {
      from { opacity: 1; }
      to { opacity: 0; }
    }

    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <video class="bg-video" preload="auto" autoplay muted loop playsinline>
    <source src="css/images/game-bg1.mp4" type="video/mp4">
  </video>
  <div class="mist-layer"></div>
  <div class="room-container">
    <!-- 顶部信息栏 -->
    <header class="room-header">
      <div class="logo-container">
        <img src="css/images/LOGO.webp" alt="Logo" class="logo">
        <div class="room-info">
          房间号: <span id="room-id" class="room-id">--</span>
          <button id="copy-room-id" class="btn copy-btn header-btn">复制</button>
        </div>
      </div>
      <div class="header-actions">
        <span id="connection-status" class="connection-status disconnected">未连接</span>
        <button id="language-toggle" class="btn language-btn header-btn">中文</button>
        <button id="voice-toggle" class="btn voice-btn header-btn">语音: 开启</button>
        <button id="exit-room" class="btn exit-btn header-btn">退出房间</button>
        <button id="switch-table-bg" class="btn switch-bg-btn header-btn">切换牌桌背景</button>
        <button id="poker-power-btn" class="btn poker-power-btn header-btn">查看牌力规则</button>
      </div>
    </header>

    <!-- 游戏主区域 -->
    <main class="game-area">
      <!-- 阶段指示器 -->
      <div class="phase-indicator-wrapper">
        <!-- 中间：游戏阶段提示框 -->
        <div class="phase-indicator" id="phase-indicator">
          <div class="phase-step" data-phase="WAITING"><span class="phase-dot"></span><span class="phase-label">等待</span></div>
          <div class="phase-step" data-phase="PRE_FLOP_BLINDS"><span class="phase-dot"></span><span class="phase-label">盲注</span></div>
          <div class="phase-step" data-phase="PRE_FLOP_BETTING"><span class="phase-dot"></span><span class="phase-label">翻前</span></div>
          <div class="phase-step" data-phase="FLOP_BETTING"><span class="phase-dot"></span><span class="phase-label">翻牌</span></div>
          <div class="phase-step" data-phase="TURN_BETTING"><span class="phase-dot"></span><span class="phase-label">转牌</span></div>
          <div class="phase-step" data-phase="RIVER_BETTING"><span class="phase-dot"></span><span class="phase-label">河牌</span></div>
          <div class="phase-step" data-phase="SHOWDOWN"><span class="phase-dot"></span><span class="phase-label">摊牌</span></div>
        </div>
      </div>

      <!-- 牌力规则图片弹出层 -->
      <div id="poker-power-modal" class="poker-power-modal" style="display: none;">
        <div class="poker-power-content">
          <img src="css/images/poker-power.jpg" alt="牌力规则" class="poker-power-image">
        </div>
      </div>

      <!-- 玩家座位区域（完整容器：包含背景图 + 公共牌 + 底池 + 所有座位） -->
      <div class="players-area">

        <div class="community-cards-section">
          <div class="community-cards" id="community-cards"></div>
        </div>

        <!-- 底池信息 -->
        <div class="pot-info">
          <div class="pot-main">底池: <span id="pot-amount">0</span></div>
          <div class="pot-blind-info" id="blind-info">SB: 10 / BB: 20</div>

            <div class="player-stats">

              <span class="divider">|</span>
              <span class="player-bet-total">本局下注: 0</span>
            </div>

          <div class="player-status" id="status-1"></div>

      <!-- 游戏状态提示 -->

    <!-- 房主专属面板 -->
    <div id="host-panel" class="host-panel" style="display: none;">
      <h3>房主控制面板</h3>
      <button id="start-game" class="btn btn-primary btn-host" style="display: none;">开始游戏</button>
      <button id="next-hand-btn" class="btn btn-success btn-host" style="display: none;">下一局</button>
      <button id="reset-game" class="btn btn-danger btn-host" style="display: none;">重置游戏</button>
      <div class="host-grid">
        <div class="host-col">
          <div class="host-control">
            <label for="small-blind-input">小盲注 (SB)</label>
            <input type="number" id="small-blind-input" min="1" value="10">
          </div>
          <div class="host-control">
            <label for="big-blind-input">大盲注 (BB)</label>
            <input type="number" id="big-blind-input" min="2" value="20">
          </div>
        </div>
        <div class="host-col">
          <div class="host-control">
            <label for="initial-chips-input">初始积分</label>
            <input type="number" id="initial-chips-input" min="100" value="1000">
          </div>
          <div class="host-control">
            <label for="deal-order">发牌顺序</label>
            <select id="deal-order">
              <option value="clockwise">顺时针</option>
              <option value="counter-clockwise">逆时针</option>
            </select>
          </div>
        </div>
      </div>
    </div>

        <button id="fold-btn" class="btn action-btn fold-btn">弃牌</button>
        <button id="check-btn" class="btn action-btn check-btn">过牌</button>
        <button id="call-btn" class="btn action-btn call-btn">跟注 <span id="call-amount">0</span></button>
        <button id="raise-btn" class="btn action-btn raise-btn">加注</button>
        <button id="all-in-btn" class="btn action-btn all-in-btn">全押</button>
      </div>
      <div class="bet-control">
        <label for="bet-amount">下注积分</label>
        <div style="display: flex; align-items: center; gap: 8px;">
          <input type="number" id="bet-amount" class="bet-amount" value="10" min="1">
          <button type="button" id="clear-bet-btn" class="btn clear-btn">清空</button>
        </div>
      </div>
      <div class="chip-buttons">
        <button class="chip-btn" data-amount="1">1</button>
        <button class="chip-btn" data-amount="5">5</button>
        <button class="chip-btn" data-amount="10">10</button>
        <button class="chip-btn" data-amount="50">50</button>
        <button class="chip-btn" data-amount="100">100</button>
        <button class="chip-btn" data-amount="500">500</button>
      </div>
      <div class="my-info">
        <span>我的积分: <strong id="my-chips">1000</strong></span>
      </div>
      <div class="chips-history">

  <!-- 鼠标跟随式光晕按钮效果 -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const neonButtons = document.querySelectorAll('.btn, .action-btn, .chip-btn');
      
      neonButtons.forEach(btn => {
        btn.addEventListener('mousemove', function(e) {
          const rect = btn.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          this.style.setProperty('--x', `${x}px`);
          this.style.setProperty('--y', `${y}px`);
        });
        
        btn.addEventListener('mouseleave', function() {
          this.style.setProperty('--x', '50%');
          this.style.setProperty('--y', '50%');
        });
      });
    });
  </script>

  <!-- 牌力规则按钮功能 -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const pokerPowerBtn = document.getElementById('poker-power-btn');
      const pokerPowerModal = document.getElementById('poker-power-modal');
      
      if (pokerPowerBtn && pokerPowerModal) {
        // 点击按钮切换图片显示/隐藏
        pokerPowerBtn.addEventListener('click', function() {
          if (pokerPowerModal.style.display === 'none' || pokerPowerModal.style.display === '') {
            pokerPowerModal.style.display = 'flex';
          } else {
            pokerPowerModal.style.display = 'none';
          }
        });
        
        // 点击弹出层背景关闭图片
        pokerPowerModal.addEventListener('click', function(e) {
          if (e.target === pokerPowerModal) {
            pokerPowerModal.style.display = 'none';
          }
        });
      }
    });
  </script>
