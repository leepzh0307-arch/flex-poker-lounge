<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flex Poker - 游戏房间</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/themes/default.css">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/room.css">
  <style>
    @view-transition {
      navigation: auto;
    }

    ::view-transition-old(root) {
      animation: fade-out 2.5s ease-in-out;
    }

    ::view-transition-new(root) {
      animation: fade-in 2.5s ease-in-out;
    }

    @keyframes fade-out {
      from { opacity: 1; }
      to { opacity: 0; }
    }

    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <video class="bg-video" preload="auto" autoplay muted loop playsinline>
    <source src="css/images/game-bg1.mp4" type="video/mp4">
  </video>
  <div class="mist-layer"></div>
  <div class="room-container">
    <!-- 顶部信息栏 -->
    <header class="room-header">
      <div class="logo-container">
        <img src="css/images/LOGO.webp" alt="Logo" class="logo">
      </div>
      <div class="room-info">
        <div>
          房间号: <span id="room-id" class="room-id">--</span>
          <button id="copy-room-id" class="btn copy-btn">复制</button>
        </div>
      </div>
      <div class="header-actions">
        <span id="connection-status" class="connection-status disconnected">🔴 未连接</span>
        <button id="language-toggle" class="btn language-btn">🌐 中文</button>
        <button id="voice-toggle" class="btn voice-btn">🔊 语音: 开启</button>
        <button id="exit-room" class="btn exit-btn">退出房间</button>
        <button id="switch-table-bg" class="btn switch-bg-btn">切换牌桌背景</button>
      </div>
    </header>

    <!-- 游戏主区域 -->
    <main class="game-area">
      <!-- 阶段指示器 -->
      <div class="phase-indicator" id="phase-indicator">
        <div class="phase-step" data-phase="WAITING"><span class="phase-dot"></span><span class="phase-label">等待</span></div>
        <div class="phase-step" data-phase="PRE_FLOP_BLINDS"><span class="phase-dot"></span><span class="phase-label">盲注</span></div>
        <div class="phase-step" data-phase="PRE_FLOP_BETTING"><span class="phase-dot"></span><span class="phase-label">翻前</span></div>
        <div class="phase-step" data-phase="FLOP_BETTING"><span class="phase-dot"></span><span class="phase-label">翻牌</span></div>
        <div class="phase-step" data-phase="TURN_BETTING"><span class="phase-dot"></span><span class="phase-label">转牌</span></div>
        <div class="phase-step" data-phase="RIVER_BETTING"><span class="phase-dot"></span><span class="phase-label">河牌</span></div>
        <div class="phase-step" data-phase="SHOWDOWN"><span class="phase-dot"></span><span class="phase-label">摊牌</span></div>
      </div>

      <!-- 玩家座位区域（完整容器：包含背景图 + 公共牌 + 底池 + 所有座位） -->
      <div class="players-area">
        <!-- 公共牌区域 -->
        <div class="community-cards-section">
          <div class="community-cards" id="community-cards"></div>
        </div>

        <!-- 底池信息 -->
        <div class="pot-info">
          <div class="pot-main">底池: <span id="pot-amount">0</span></div>
          <div class="pot-blind-info" id="blind-info">SB: 10 / BB: 20</div>
        </div>

        <div class="player-seat seat-1" id="player-1">
          <div class="position-badge" id="pos-1"></div>
          <div class="player-info">
            <div class="player-name">--</div>
            <div class="player-chips">0</div>
          </div>
          <div class="player-bet" id="bet-1"></div>
          <div class="player-cards"></div>
          <div class="player-status" id="status-1"></div>
        </div>
        <div class="player-seat seat-2" id="player-2">
          <div class="position-badge" id="pos-2"></div>
          <div class="player-info">
            <div class="player-name">--</div>
            <div class="player-chips">0</div>
          </div>
          <div class="player-bet" id="bet-2"></div>
          <div class="player-cards"></div>
          <div class="player-status" id="status-2"></div>
        </div>
        <div class="player-seat seat-3" id="player-3">
          <div class="position-badge" id="pos-3"></div>
          <div class="player-info">
            <div class="player-name">--</div>
            <div class="player-chips">0</div>
          </div>
          <div class="player-bet" id="bet-3"></div>
          <div class="player-cards"></div>
          <div class="player-status" id="status-3"></div>
        </div>
        <div class="player-seat seat-4" id="player-4">
          <div class="position-badge" id="pos-4"></div>
          <div class="player-info">
            <div class="player-name">--</div>
            <div class="player-chips">0</div>
          </div>
          <div class="player-bet" id="bet-4"></div>
          <div class="player-cards"></div>
          <div class="player-status" id="status-4"></div>
        </div>
        <div class="player-seat seat-5" id="player-5">
          <div class="position-badge" id="pos-5"></div>
          <div class="player-info">
            <div class="player-name">--</div>
            <div class="player-chips">0</div>
          </div>
          <div class="player-bet" id="bet-5"></div>
          <div class="player-cards"></div>
          <div class="player-status" id="status-5"></div>
        </div>
        <div class="player-seat seat-6" id="player-6">
          <div class="position-badge" id="pos-6"></div>
          <div class="player-info">
            <div class="player-name">--</div>
            <div class="player-chips">0</div>
          </div>
          <div class="player-bet" id="bet-6"></div>
          <div class="player-cards"></div>
          <div class="player-status" id="status-6"></div>
        </div>
        <div class="player-seat seat-7" id="player-7">
          <div class="position-badge" id="pos-7"></div>
          <div class="player-info">
            <div class="player-name">--</div>
            <div class="player-chips">0</div>
          </div>
          <div class="player-bet" id="bet-7"></div>
          <div class="player-cards"></div>
          <div class="player-status" id="status-7"></div>
        </div>
        <div class="player-seat seat-8" id="player-8">
          <div class="position-badge" id="pos-8"></div>
          <div class="player-info">
            <div class="player-name">--</div>
            <div class="player-chips">0</div>
          </div>
          <div class="player-bet" id="bet-8"></div>
          <div class="player-cards"></div>
          <div class="player-status" id="status-8"></div>
        </div>
        <div class="player-seat seat-9" id="player-9">
          <div class="position-badge" id="pos-9"></div>
          <div class="player-info">
            <div class="player-name">--</div>
            <div class="player-chips">0</div>
          </div>
          <div class="player-bet" id="bet-9"></div>
          <div class="player-cards"></div>
          <div class="player-status" id="status-9"></div>
        </div>
        <div class="player-seat seat-10" id="player-10">
          <div class="position-badge" id="pos-10"></div>
          <div class="player-info">
            <div class="player-name">--</div>
            <div class="player-chips">0</div>
          </div>
          <div class="player-bet" id="bet-10"></div>
          <div class="player-cards"></div>
          <div class="player-status" id="status-10"></div>
        </div>
      </div>

      <!-- 游戏状态提示 -->
      <div id="game-status" class="game-status" style="display: none;">
        <h2 id="status-title">游戏开始</h2>
        <p id="status-message">请等待所有玩家准备</p>
      </div>
    </main>

    <!-- 房主专属面板 -->
    <div id="host-panel" class="host-panel" style="display: none;">
      <h3>房主控制面板</h3>
      <div class="host-grid">
        <div class="host-col">
          <div class="host-control">
            <label for="small-blind-input">小盲注 (SB)</label>
            <input type="number" id="small-blind-input" min="1" value="10">
          </div>
          <div class="host-control">
            <label for="big-blind-input">大盲注 (BB)</label>
            <input type="number" id="big-blind-input" min="2" value="20">
          </div>
        </div>
        <div class="host-col">
          <div class="host-control">
            <label for="deal-order">发牌顺序</label>
            <select id="deal-order">
              <option value="clockwise">顺时针</option>
              <option value="counter-clockwise">逆时针</option>
            </select>
          </div>
          <div class="host-control">
            <label for="initial-chips-input">初始积分</label>
            <input type="number" id="initial-chips-input" min="100" value="1000">
          </div>
        </div>
        <div class="host-col">
          <div class="host-actions">
            <button id="start-game" class="btn btn-primary">开始游戏</button>
            <button id="next-hand-btn" class="btn btn-success" style="display:none;">下一局</button>
            <button id="reset-game" class="btn btn-danger">重置游戏</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 下注操作面板 -->
    <div id="action-panel" class="action-panel">
      <h3>下注操作</h3>
      <div class="action-buttons-vertical">
        <button id="fold-btn" class="btn action-btn fold-btn">弃牌</button>
        <button id="check-btn" class="btn action-btn check-btn">过牌</button>
        <button id="call-btn" class="btn action-btn call-btn">跟注 <span id="call-amount">0</span></button>
        <button id="raise-btn" class="btn action-btn raise-btn">加注</button>
        <button id="all-in-btn" class="btn action-btn all-in-btn">全押</button>
      </div>
      <div class="bet-control">
        <label for="bet-amount">下注积分</label>
        <input type="number" id="bet-amount" class="bet-amount" value="10" min="1">
      </div>
      <div class="chip-buttons">
        <button class="chip-btn" data-amount="10">10</button>
        <button class="chip-btn" data-amount="50">50</button>
        <button class="chip-btn" data-amount="100">100</button>
        <button class="chip-btn" data-amount="500">500</button>
      </div>
      <div class="my-info">
        <span>我的积分: <strong id="my-chips">1000</strong></span>
      </div>
    </div>

    <!-- 游戏进程复述面板 -->
    <div id="game-log-panel" class="game-log-panel">
      <h3>游戏进程</h3>
      <div id="game-log-list" class="game-log-list"></div>
    </div>
  </div>

  <!-- Socket.io -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <!-- 声网SDK -->
  <script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>
  <script src="js/config.js"></script>
  <script src="js/socket.js"></script>
  <script src="js/agora.js"></script>
  <script src="js/room/ui.js"></script>
  <script src="js/room/game.js"></script>
  <script src="js/room/rules/texas.js"></script>
  <script src="js/room/rules/custom.js"></script>
</body>
</html>
